<!DOCTYPE html>
<html>
<head>
  <title>Smart Socket Dashboard</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      padding: 30px;
      color: white;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 32px;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #00f5ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 0 15px rgba(0,255,255,0.2);
      transition: 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 25px rgba(0,255,255,0.5);
    }

    .card h2 {
      font-size: 16px;
      margin-bottom: 10px;
      opacity: 0.8;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
      color: #00f5ff;
      transition: 0.3s;
    }

    .highlight {
      color: #00ff88;
    }

    .pulse {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { text-shadow: 0 0 5px #00f5ff; }
      50% { text-shadow: 0 0 20px #00f5ff; }
      100% { text-shadow: 0 0 5px #00f5ff; }
    }

    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<h1>⚡ Smart Socket Energy Dashboard</h1>

<div class="grid">

  <div class="card">
    <h2>Voltage (V)</h2>
    <div class="value pulse" id="voltage">--</div>
  </div>

  <div class="card">
    <h2>Current (A)</h2>
    <div class="value pulse" id="current">--</div>
  </div>

  <div class="card">
    <h2>Power (W)</h2>
    <div class="value pulse" id="power">--</div>
  </div>

  <div class="card">
    <h2>Energy (kWh)</h2>
    <div class="value" id="energy">--</div>
  </div>

  <div class="card">
    <h2>Monthly Units</h2>
    <div class="value highlight" id="monthlyUnits">--</div>
  </div>

  <div class="card">
    <h2>Monthly Bill (₹)</h2>
    <div class="value highlight" id="monthlyBill">--</div>
  </div>

  <div class="card">
    <h2>Peak Hours</h2>
    <div class="value" id="peakHours">--</div>
  </div>

  <div class="card">
    <h2>Suggested Usage Hour</h2>
    <div class="value highlight" id="suggestedHour">--</div>
  </div>

</div>

<footer>
  IoT Smart Energy Monitoring System | B.Tech Mini Project
</footer>

<script>

  // 🔥 Replace with YOUR Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    databaseURL: "YOUR_DATABASE_URL"
  };

  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  // LIVE DATA
  database.ref("smart_socket/live/voltage").on("value", snap => {
    document.getElementById("voltage").innerText = snap.val()?.toFixed(1) + " V";
  });

  database.ref("smart_socket/live/current").on("value", snap => {
    document.getElementById("current").innerText = snap.val()?.toFixed(2) + " A";
  });

  database.ref("smart_socket/live/power").on("value", snap => {
    document.getElementById("power").innerText = snap.val()?.toFixed(1) + " W";
  });

  database.ref("smart_socket/live/energy").on("value", snap => {
    document.getElementById("energy").innerText = snap.val()?.toFixed(4) + " kWh";
  });

  // MONTHLY
  database.ref("smart_socket/monthly/units").on("value", snap => {
    document.getElementById("monthlyUnits").innerText = snap.val()?.toFixed(3);
  });

  database.ref("smart_socket/monthly/bill").on("value", snap => {
    document.getElementById("monthlyBill").innerText = snap.val()?.toFixed(2);
  });

  // ANALYTICS
  database.ref("smart_socket/analytics/peak1").on("value", snap => {
    const p1 = snap.val();
    database.ref("smart_socket/analytics/peak2").once("value").then(snap2 => {
      const p2 = snap2.val();
      if(p1 !== null && p2 !== null)
        document.getElementById("peakHours").innerText =
          p1 + ":00 - " + (p1+1) + ":00 , " +
          p2 + ":00 - " + (p2+1) + ":00";
    });
  });

  database.ref("smart_socket/analytics/suggested_hour").on("value", snap => {
    const sh = snap.val();
    if(sh !== null)
      document.getElementById("suggestedHour").innerText =
        sh + ":00 - " + (sh+1) + ":00";
  });

</script>

</body>
</html>
